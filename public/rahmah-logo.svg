<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Background -->
  <rect width="120" height="120" rx="24" fill="#1c3c33"/>
  
  <!-- Open Quran book shape -->
  <path d="M60 38 C50 38 36 42 30 50 L30 82 C36 76 50 73 60 74 C70 73 84 76 90 82 L90 50 C84 42 70 38 60 38Z" fill="none" stroke="#F3D083" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Center spine -->
  <line x1="60" y1="38" x2="60" y2="74" stroke="#F3D083" stroke-width="2.5"/>
  <!-- Left page lines -->
  <line x1="38" y1="55" x2="56" y2="52" stroke="#F3D083" stroke-width="1.2" opacity="0.6"/>
  <line x1="37" y1="61" x2="56" y2="58" stroke="#F3D083" stroke-width="1.2" opacity="0.6"/>
  <line x1="37" y1="67" x2="56" y2="65" stroke="#F3D083" stroke-width="1.2" opacity="0.6"/>
  <!-- Right page lines -->
  <line x1="82" y1="55" x2="64" y2="52" stroke="#F3D083" stroke-width="1.2" opacity="0.6"/>
  <line x1="83" y1="61" x2="64" y2="58" stroke="#F3D083" stroke-width="1.2" opacity="0.6"/>
  <line x1="83" y1="67" x2="64" y2="65" stroke="#F3D083" stroke-width="1.2" opacity="0.6"/>

  <!-- Crescent moon top -->
  <path d="M60 18 C54 18 49 23 49 29 C49 35 54 40 60 40 C56 36 55 32 57 28 C59 24 62 21 66 20 C64 19 62 18 60 18Z" fill="#F3D083"/>
  
  <!-- Stars -->
  <circle cx="73" cy="22" r="1.5" fill="#F3D083" opacity="0.8"/>
  <circle cx="78" cy="28" r="1" fill="#F3D083" opacity="0.6"/>
  <circle cx="48" cy="24" r="1" fill="#F3D083" opacity="0.5"/>

  <!-- RAHMAH text -->
  <text x="60" y="98" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#F3D083" text-anchor="middle" letter-spacing="2">RAHMAH</text>
  <text x="60" y="110" font-family="Arial, sans-serif" font-size="6" fill="#F3D083" text-anchor="middle" letter-spacing="1" opacity="0.6">MANAGEMENT</text>
</svg>
